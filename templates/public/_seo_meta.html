<title>{{ seo_data.title }}</title>

<meta
  name="description"
  content="{{ seo_data.description }}"
>

<meta
  name="robots"
  content="{{ seo_data.robots }}"
>

<link
  rel="canonical"
  href="{{ seo_data.canonical_url }}"
>

<meta
  property="og:locale"
  content="en_PK"
>

<meta
  property="og:type"
  content="{{ seo_data.og_type }}"
>

<meta
  property="og:site_name"
  content="{{ seo_data.site_name }}"
>

<meta
  property="og:title"
  content="{{ seo_data.title }}"
>

<meta
  property="og:description"
  content="{{ seo_data.description }}"
>

<meta
  property="og:url"
  content="{{ seo_data.canonical_url }}"
>

<meta
  property="og:image"
  content="{{ seo_data.og_image }}"
>

<meta
  property="og:image:alt"
  content="{{ seo_data.og_image_alt }}"
>

<meta
  property="og:image:width"
  content="1200"
>

<meta
  property="og:image:height"
  content="630"
>

<meta
  name="twitter:card"
  content="summary_large_image"
>

<meta
  name="twitter:title"
  content="{{ seo_data.title }}"
>

<meta
  name="twitter:description"
  content="{{ seo_data.description }}"
>

<meta
  name="twitter:image"
  content="{{ seo_data.og_image }}"
>

<meta
  name="twitter:image:alt"
  content="{{ seo_data.og_image_alt }}"
>

<meta
  name="theme-color"
  content="#06493c"
>

{% if seo_data.schema %}
<script type="application/ld+json">
{{ seo_data.schema | tojson }}
</script>
{% endif %}
