
{% extends "emails/base.html" %}
{% block title %}Inquiry Update{% endblock %}
{% block content %}
<p style="margin:0 0 8px;color:#c18400;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;">Inquiry Update</p>
<h1 style="margin:0 0 12px;font-size:25px;">{{ inquiry.inquiry_number }}</h1>
<p style="margin:0 0 22px;color:#667085;font-size:14px;line-height:1.7;">Hello {{ inquiry.customer_name }}, your inquiry status is now <strong>{{ inquiry.inquiry_status.replace('_', ' ')|title }}</strong>.</p>
<p style="margin:24px 0 0;"><a href="{{ inquiry_url }}" style="display:inline-block;padding:13px 20px;border-radius:10px;background:#064f40;color:#ffffff;text-decoration:none;font-size:13px;font-weight:700;">View Inquiry</a></p>
{% endblock %}
